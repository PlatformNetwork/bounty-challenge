name: Release

on:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "bounty-wasm"
      - name: Build WASM
        run: cargo build --release --target wasm32-unknown-unknown
      - uses: actions/upload-artifact@v4
        with:
          name: wasm
          path: target/wasm32-unknown-unknown/release/bounty_challenge.wasm

  build-cli:
    name: Build CLI (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: bounty-cli
            output: bounty-cli-linux-x86_64
          - name: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            artifact: bounty-cli
            output: bounty-cli-darwin-x86_64
          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            artifact: bounty-cli
            output: bounty-cli-darwin-aarch64
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: bounty-cli.exe
            output: bounty-cli-windows-x86_64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "bounty-cli-${{ matrix.name }}"
      - name: Build CLI
        run: cargo build --release -p bounty-cli --target ${{ matrix.target }}
      - name: Rename artifact (unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.artifact }} ${{ matrix.output }}
          chmod +x ${{ matrix.output }}
      - name: Rename artifact (windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/${{ matrix.artifact }} ${{ matrix.output }}
      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.name }}
          path: ${{ matrix.output }}

  release:
    name: Create Release
    needs: [build-wasm, build-cli]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS

      - name: Check tag
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Bounty Challenge v${{ steps.version.outputs.version }}
          body: |
            ## Bounty Challenge v${{ steps.version.outputs.version }}
            
            ### Downloads
            | Platform | Binary |
            |----------|--------|
            | Linux x86_64 | `bounty-cli-linux-x86_64` |
            | macOS x86_64 | `bounty-cli-darwin-x86_64` |
            | macOS ARM (M1/M2) | `bounty-cli-darwin-aarch64` |
            | Windows x86_64 | `bounty-cli-windows-x86_64.exe` |
            | WASM module | `bounty_challenge.wasm` |
            
            ### Installation
            ```bash
            # Linux / macOS
            curl -LO https://github.com/PlatformNetwork/bounty-challenge/releases/latest/download/bounty-cli-linux-x86_64
            chmod +x bounty-cli-linux-x86_64
            ./bounty-cli-linux-x86_64
            ```
            
            The CLI connects to `https://chain.platform.network` by default.
            Set `BOUNTY_RPC_URL` to override.
          files: |
            artifacts/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
